spring.application.name=backend
# Use Atlas or local MongoDB. Do not commit real credentials; set MONGODB_URI in the environment.
# Example: mongodb+srv://USER:PASS@cluster.mongodb.net/Campus_Management
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/Campus_Management}

# File upload properties
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=15MB

# Custom property for image storage location
app.upload.dir=uploads
